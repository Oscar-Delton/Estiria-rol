<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Estiria</title>
        <link rel="manifest" href="manifest.json" />
          <link rel="stylesheet" href="style.css" />
            <meta name="theme-color" content="#1a1a2e" />
            </head>
            <body>

              <div id="splash">
                  <div class="splash-content">
                        <h1>⚔️ Estiria</h1>
                              <p>Cargando...</p>
                                  </div>
                                    </div>

                                      <div id="app" class="hidden">
                                          <header id="header">
                                                <h2 id="header-title">Estiria</h2>
                                                      <div id="user-info"></div>
                                                          </header>
                                                              <main id="main-content"></main>
                                                                  <nav id="bottom-nav">
                                                                        <button class="nav-btn active" data-section="inicio">
                                                                                <span class="nav-icon">🏠</span>
                                                                                        <span class="nav-label">Inicio</span>
                                                                                              </button>
                                                                                                    <button class="nav-btn" data-section="banco">
                                                                                                            <span class="nav-icon">🏦</span>
                                                                                                                    <span class="nav-label">Banco</span>
                                                                                                                          </button>
                                                                                                                                <button class="nav-btn" data-section="biblioteca">
                                                                                                                                        <span class="nav-icon">📚</span>
                                                                                                                                                <span class="nav-label">Biblioteca</span>
                                                                                                                                                      </button>
                                                                                                                                                            <button class="nav-btn" data-section="perfil">
                                                                                                                                                                    <span class="nav-icon">👤</span>
                                                                                                                                                                            <span class="nav-label">Perfil</span>
                                                                                                                                                                                  </button>
                                                                                                                                                                                      </nav>
                                                                                                                                                                                        </div>

                                                                                                                                                                                          <!-- LOGIN -->
                                                                                                                                                                                            <div id="login-screen" class="hidden">
                                                                                                                                                                                                <div class="login-content">
                                                                                                                                                                                                      <h1>⚔️ Estiria</h1>

                                                                                                                                                                                                            <!-- TABS -->
                                                                                                                                                                                                                  <div class="auth-tabs">
                                                                                                                                                                                                                          <button class="auth-tab active" data-tab="login">Iniciar sesión</button>
                                                                                                                                                                                                                                  <button class="auth-tab" data-tab="register">Registrarse</button>
                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                              <!-- LOGIN -->
                                                                                                                                                                                                                                                    <div id="tab-login">
                                                                                                                                                                                                                                                            <input type="text" id="login-username" placeholder="Nombre de usuario" autocomplete="username"/>
                                                                                                                                                                                                                                                                    <input type="password" id="login-password" placeholder="Contraseña" autocomplete="current-password"/>
                                                                                                                                                                                                                                                                            <button id="login-btn">Entrar a Estiria</button>
                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                        <!-- REGISTRO -->
                                                                                                                                                                                                                                                                                              <div id="tab-register" class="hidden">
                                                                                                                                                                                                                                                                                                      <input type="text" id="reg-username" placeholder="Nombre de usuario (único)" autocomplete="username"/>
                                                                                                                                                                                                                                                                                                              <input type="password" id="reg-password" placeholder="Contraseña" autocomplete="new-password"/>
                                                                                                                                                                                                                                                                                                                      <input type="password" id="reg-password2" placeholder="Confirmar contraseña" autocomplete="new-password"/>
                                                                                                                                                                                                                                                                                                                              <input type="text" id="reg-whatsapp" placeholder="Número de WhatsApp (opcional)"/>
                                                                                                                                                                                                                                                                                                                                      <button id="register-btn">Crear cuenta</button>
                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                  <div id="login-error" class="hidden"></div>
                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                          <script type="module" src="firebase-config.js"></script>
                                                                                                                                                                                                                                                                                                                                                            <script type="module" src="app.js"></script>
                                                                                                                                                                                                                                                                                                                                                              <script>
                                                                                                                                                                                                                                                                                                                                                                  if ('serviceWorker' in navigator) {
                                                                                                                                                                                                                                                                                                                                                                        navigator.serviceWorker.register('./sw.js');
                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                              </script>

                                                                                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                                                                                              </html>
