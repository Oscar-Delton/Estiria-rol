<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Estiria</title>
        <link rel="manifest" href="manifest.json" />
          <link rel="stylesheet" href="style.css" />
            <meta name="theme-color" content="#1a1a2e" />
            </head>
            <body>

              <!-- PANTALLA DE CARGA -->
                <div id="splash">
                    <div class="splash-content">
                          <h1>⚔️ Estiria</h1>
                                <p>Cargando...</p>
                                    </div>
                                      </div>

                                        <!-- APP PRINCIPAL (oculta hasta que cargue) -->
                                          <div id="app" class="hidden">

                                              <!-- HEADER -->
                                                  <header id="header">
                                                        <h2 id="header-title">Estiria</h2>
                                                              <div id="user-info"></div>
                                                                  </header>

                                                                      <!-- CONTENIDO PRINCIPAL -->
                                                                          <main id="main-content">
                                                                                <!-- Las secciones se cargan aquí dinámicamente -->
                                                                                    </main>

                                                                                        <!-- NAVEGACIÓN INFERIOR -->
                                                                                            <nav id="bottom-nav">
                                                                                                  <button class="nav-btn active" data-section="inicio">
                                                                                                          <span class="nav-icon">🏠</span>
                                                                                                                  <span class="nav-label">Inicio</span>
                                                                                                                        </button>
                                                                                                                              <button class="nav-btn" data-section="banco">
                                                                                                                                      <span class="nav-icon">🏦</span>
                                                                                                                                              <span class="nav-label">Banco</span>
                                                                                                                                                    </button>
                                                                                                                                                          <button class="nav-btn" data-section="biblioteca">
                                                                                                                                                                  <span class="nav-icon">📚</span>
                                                                                                                                                                          <span class="nav-label">Biblioteca</span>
                                                                                                                                                                                </button>
                                                                                                                                                                                      <button class="nav-btn" data-section="perfil">
                                                                                                                                                                                              <span class="nav-icon">👤</span>
                                                                                                                                                                                                      <span class="nav-label">Perfil</span>
                                                                                                                                                                                                            </button>
                                                                                                                                                                                                                </nav>

                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                    <!-- LOGIN (oculto hasta que se necesite) -->
                                                                                                                                                                                                                      <div id="login-screen" class="hidden">
                                                                                                                                                                                                                          <div class="login-content">
                                                                                                                                                                                                                                <h1>⚔️ Estiria</h1>
                                                                                                                                                                                                                                      <p class="login-subtitle">Inicia sesión con tu número de WhatsApp</p>

                                                                                                                                                                                                                                            <div id="step-phone">
                                                                                                                                                                                                                                                    <input type="tel" id="phone-input" placeholder="+57 300 123 4567" />
                                                                                                                                                                                                                                                            <button id="send-code-btn">Enviar código</button>
                                                                                                                                                                                                                                                                    <div id="recaptcha-container"></div>
                                                                                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                                                                                <div id="step-code" class="hidden">
                                                                                                                                                                                                                                                                                        <p>Ingresa el código que recibiste por SMS</p>
                                                                                                                                                                                                                                                                                                <input type="number" id="code-input" placeholder="123456" />
                                                                                                                                                                                                                                                                                                        <button id="verify-code-btn">Verificar</button>
                                                                                                                                                                                                                                                                                                                <button id="back-btn">← Volver</button>
                                                                                                                                                                                                                                                                                                                      </div>

                                                                                                                                                                                                                                                                                                                            <div id="login-error" class="hidden"></div>
                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                  </div>

                                                                                                                                                                                                                                                                                                                                    <!-- Firebase SDK -->
                                                                                                                                                                                                                                                                                                                                      <script type="module" src="firebase-config.js"></script>
                                                                                                                                                                                                                                                                                                                                        <script type="module" src="app.js"></script>

                                                                                                                                                                                                                                                                                                                                          <!-- Service Worker -->
                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                if ('serviceWorker' in navigator) {
                                                                                                                                                                                                                                                                                                                                                      navigator.serviceWorker.register('/sw.js');
                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                            </script>

                                                                                                                                                                                                                                                                                                                                                            </body>
                                                                                                                                                                                                                                                                                                                                                            </html>
